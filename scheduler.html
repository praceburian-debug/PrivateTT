<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body style="padding: 15px;">
  <div id="loading">Načítám...</div>
  <div id="auth-section" style="display:none; text-align:center;">
    <button id="auth-btn" class="mod-primary">Autorizovat aplikaci</button>
  </div>
  <div id="scheduler-form" style="display:none;">
    <input type="datetime-local" id="date" style="width:100%; margin-bottom:10px;">
    <textarea id="msg" style="width:100%; height:60px;" placeholder="Zpráva..."></textarea>
    <button id="save-btn" class="mod-primary" style="width:100%; margin-top:10px;">Naplánovat</button>
    <div id="list-container" style="margin-top:15px; font-size:12px;"></div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe({
      appKey: '4970b28a9bf54fcfa9298b7e4e50660f',
      appName: 'Private Time Tracker'
    });

    // Zobrazení seznamu zpráv
    function updateList() {
      t.get('card', 'shared', 'scheduled_comments', []).then(function(list) {
        var c = document.getElementById('list-container');
        if(!list.length) { c.innerHTML = "Žádné zprávy."; return; }
        c.innerHTML = list.map((item, i) => `<div>${new Date(item.date).toLocaleString()} - ${item.msg}</div>`).join('');
      });
    }

    t.render(function() {
      return t.getRestApi().isAuthorized()
        .then(function(auth) {
          document.getElementById('loading').style.display = 'none';
          if(auth) {
            document.getElementById('scheduler-form').style.display = 'block';
            updateList();
          } else {
            document.getElementById('auth-section').style.display = 'block';
          }
        })
        .catch(function(e) { console.error("Trello API Error:", e); });
    });

    document.getElementById('auth-btn').onclick = function() {
      t.getRestApi().authorize({ scope: 'read,write', type: 'popup', expiration: 'never' })
        .then(() => { location.reload(); })
        .catch(err => { alert("Chyba autorizace: " + err.message); });
    };

    document.getElementById('save-btn').onclick = function() {
      var d = document.getElementById('date').value;
      var m = document.getElementById('msg').value;
      t.getRestApi().getToken().then(function(token) {
        return t.get('card', 'shared', 'scheduled_comments', [])
          .then(list => {
            list.push({ date: d, msg: m, token: btoa(token) });
            return t.set('card', 'shared', 'scheduled_comments', list);
          });
      }).then(() => { updateList(); });
    };
  </script>
</body>
</html>
