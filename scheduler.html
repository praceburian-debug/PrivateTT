<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body style="padding: 15px;">
  <div id="loading">Načítám spojení s Trellem...</div>
  
  <div id="auth-section" style="display:none; text-align:center;">
    <p>Pro odesílání komentářů pod tvým jménem musíš aplikaci povolit přístup.</p>
    <button id="auth-btn" class="mod-primary">Autorizovat</button>
  </div>

  <div id="scheduler-form" style="display:none;">
    <label>Kdy odeslat?</label>
    <input type="datetime-local" id="date" style="width:100%; margin-bottom:10px;">
    <label>Zpráva</label>
    <textarea id="msg" style="width:100%; height:60px;" placeholder="Napiš komentář..."></textarea>
    <button id="save-btn" class="mod-primary" style="width:100%; margin-top:10px;">Naplánovat</button>
  </div>

  <script>
    var t = TrelloPowerUp.iframe({
      appKey: '4970b28a9bf54fcfa9298b7e4e50660f',
      appName: 'Private Time Tracker'
    });

    function render() {
      return t.getRestApi().isAuthorized()
        .then(function(authorized) {
          document.getElementById('loading').style.display = 'none';
          if (authorized) {
            document.getElementById('scheduler-form').style.display = 'block';
            document.getElementById('auth-section').style.display = 'none';
            var now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('date').value = now.toISOString().slice(0,16);
          } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('scheduler-form').style.display = 'none';
          }
        })
        .catch(function(err) {
          document.getElementById('loading').innerHTML = "Chyba inicializace.";
        });
    }

    render();

   document.getElementById('auth-btn').onclick = function() {
  t.getRestApi().authorize({ 
    scope: 'read,write',
    type: 'popup', // Vynutí vyskakovací okno pro souhlas
    expiration: 'never'
  })
  .then(function() { render(); })
  .catch(function(err) { alert("Chyba: " + err.message); });
};

    document.getElementById('save-btn').onclick = function() {
      var d = document.getElementById('date').value;
      var m = document.getElementById('msg').value;
      if(!d || !m) return;

      t.getRestApi().getToken()
        .then(function(token) {
          if(!token) throw new Error("Token nebyl získán");
          
          // MASKUJEME TOKEN
          var maskedToken = btoa(token);

          return t.get('card', 'shared', 'scheduled_comments', [])
            .then(function(list) {
              list.push({ date: d, msg: m, token: maskedToken });
              return t.set('card', 'shared', 'scheduled_comments', list);
            });
        })
        .then(function() { t.closePopup(); })
        .catch(function(err) {
          alert("Chyba při ukládání: " + err.message);
        });
    };
  </script>
</body>
</html>
