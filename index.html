<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // Seznam ID uživatelů, kteří mají Power-Up vidět
    const ALLOWED_USERS = [
      '651e8ba7f2ed2f797856dfed',
      '62f0c7f59183be0274f01ecc'
    ];

    var t = TrelloPowerUp.initialize({
      'card-badges': function(t, options) {
        return t.get('card', 'shared', 'workLogs', {})
          .then(function(allLogs) {
            const currentMember = t.getContext().member;
            
            // Kontrola přístupu
            if (!ALLOWED_USERS.includes(currentMember)) return [];

            var grandTotalSeconds = 0;
            var someoneIsActive = false;

            // Projdeme logy všech uživatelů a sečteme je
            Object.values(allLogs).forEach(function(uData) {
              // Sečteme hotové logy
              if (uData.logs) {
                grandTotalSeconds += uData.logs.reduce((sum, log) => sum + log.duration, 0);
              }
              // Přičteme případný běžící čas
              if (uData.activeStart) {
                grandTotalSeconds += Math.floor((Date.now() - uData.activeStart) / 1000);
                someoneIsActive = true;
              }
            });

            if (grandTotalSeconds === 0 && !someoneIsActive) return [];

            return [{
              text: (grandTotalSeconds / 3600).toFixed(2) + ' hod celkem',
              color: someoneIsActive ? 'green' : 'blue'
            }];
          });
      },
      'card-back-section': function(t, options) {
        const currentMember = t.getContext().member;
        if (!ALLOWED_USERS.includes(currentMember)) return null;

        return {
          title: 'Soukromý Time Tracking',
          icon: 'https://cdn.hyperdev.com/us-east-1%3A3d31b21c-01a0-4fc2-880a-504e0e84429a%2Ficon-gray.svg',
          content: {
            type: 'iframe',
            url: t.signUrl('./section.html'),
            height: 250 // Trochu jsem zvětšil výšku, aby se tam vešla ta historie
          }
        };
      }
    });
  </script>
</body>
</html>
