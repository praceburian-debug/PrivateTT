<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
 <script>
    // TVOJE KONSTANTA
    const ADMIN_ID = '651e8ba7f2ed2f797856dfed'; 

    // POMOCNÁ FUNKCE PRO FORMÁT ČASU
    function formatToHHMM(seconds) {
      var h = Math.floor(seconds / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      return h + ":" + (m < 10 ? "0" : "") + m;
    }

    // FUNKCE PRO KONTROLU A ODESLÁNÍ NAPLÁNOVANÝCH KOMENTÁŘŮ
    function checkScheduledComments(t) {
      return t.get('card', 'shared', 'scheduled_comments', [])
      .then(function(comments) {
        if (!comments || comments.length === 0) return;

        var now = new Date().getTime();
        var remaining = [];
        var toSend = [];

        comments.forEach(function(c) {
          if (new Date(c.date).getTime() <= now) {
            toSend.push(c);
          } else {
            remaining.push(c);
          }
        });

        if (toSend.length > 0) {
          // Pro každý komentář, který už měl být odeslán
          toSend.forEach(function(c) {
            // Trello API volání pro přidání komentáře
            t.getRestApi().getToken().then(function(token) {
              if(!token) return; // Pokud uživatel neschválil API, smůla
              
              // Odeslání komentáře přes Trello REST API
              // Poznámka: vyžaduje t.getRestApi().isAuthorized()
              // Pro jednoduchost teď komentář jen uložíme jako "odeslaný" do logu nebo provedeme přes t.set
              console.log("Odesílám komentář: " + c.msg);
              // Zde by následoval fetch na Trello API
            });
          });
          // Aktualizujeme seznam (odstraníme odeslané)
          return t.set('card', 'shared', 'scheduled_comments', remaining);
        }
      });
    }

    TrelloPowerUp.initialize({
      'card-badges': function(t, options) {
        // Při každém načtení badge zkontrolujeme, zda není čas něco odeslat
        checkScheduledComments(t);

        return Promise.all([
          t.get('card', 'shared', 'allowedUsers', [ADMIN_ID]),
          t.get('card', 'shared', 'workLogs', {})
        ]).then(function(res) {
          var allowedUsers = res[0];
          var allLogs = res[1];
          var me = t.getContext().member;
          if (!allowedUsers.includes(me)) return [];

          var total = 0;
          var active = false;
          allowedUsers.forEach(u => {
            if (allLogs[u]) {
              total += (allLogs[u].logs || []).reduce((s, l) => s + (l.duration || 0), 0);
              if (allLogs[u].activeStart) {
                total += Math.floor((Date.now() - allLogs[u].activeStart) / 1000);
                active = true;
              }
            }
          });
          if (total === 0 && !active) return [];
          return [{ text: formatToHHMM(total), color: active ? 'green' : 'blue' }];
        });
      },

      'card-back-section': function(t, options) {
        return t.get('card', 'shared', 'allowedUsers', [ADMIN_ID]).then(function(allowed) {
          var me = t.getContext().member;
          if (me !== ADMIN_ID && !allowed.includes(me)) return null;

          return {
            title: '',
            icon: './icon.svg',
            content: {
              type: 'iframe',
              url: t.signUrl('./section.html'),
              initialHeight: 44
            }
          };
        });
      },

      'board-buttons': function(t, options) {
        var me = t.getContext().member;
        if (me !== ADMIN_ID) return [];

        return [{
          icon: './icon.svg',
          text: 'Reporty času',
          callback: function(t) {
            return t.modal({
              title: "Přehled odpracovaného času",
              url: './report.html',
              fullscreen: true
            });
          }
        }];
      },

      'card-buttons': function(t, options) {
        return [{
          icon: './icon.svg',
          text: 'Odeslat později',
          callback: function(t) {
            return t.popup({
              title: 'Naplánovat komentář',
              url: './scheduler.html',
              height: 280
            });
          }
        }];
      }
    });
  </script>
</body>
</html>
