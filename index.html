<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // --- KONFIGURACE ---
    const ADMIN_ID = '651e8ba7f2ed2f797856dfed'; 
    const TRELLO_API_KEY = '4970b28a9bf54fcfa9298b7e4e50660f'; 

    // POMOCNÁ FUNKCE PRO FORMÁT ČASU
    function formatToHHMM(seconds) {
      var h = Math.floor(seconds / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      return h + ":" + (m < 10 ? "0" : "") + m;
    }

    // FUNKCE PRO KONTROLU A ODESLÁNÍ NAPLÁNOVANÝCH KOMENTÁŘŮ
  function checkScheduledComments(t) {
  return t.get('card', 'shared', 'scheduled_comments', [])
  .then(function(comments) {
    if (!comments || comments.length === 0) return;

    var now = new Date().getTime();
    var toSend = comments.filter(c => new Date(c.date).getTime() <= now);
    var remaining = comments.filter(c => new Date(c.date).getTime() > now);

    if (toSend.length > 0) {
      // Získáme token aktuálně přihlášeného uživatele
      return t.getRestApi().getToken().then(function(token) {
        // Pokud kolega ještě nedal "Autorizovat", token nebude mít a nic se neodešle (pošle se to, až kartu otevřeš ty nebo on po autorizaci)
        if (!token) return; 

        return t.card('id').then(function(cardData) {
          var cardId = cardData.id;
          
          var promises = toSend.map(function(c) {
            // Používáme token aktuálního uživatele - Trello pak pozná, kdo komentář píše
            var url = `https://api.trello.com/1/cards/${cardId}/actions/comments?text=${encodeURIComponent(c.msg)}&key=${TRELLO_API_KEY}&token=${token}`;
            return fetch(url, { method: 'POST' });
          });

          return Promise.all(promises).then(function() {
            return t.set('card', 'shared', 'scheduled_comments', remaining);
          });
        });
      });
    }
  });
}

    // TADY JE TA NEJDŮLEŽITĚJŠÍ ZMĚNA - PŘIDÁNÍ APPKEY A APPNAME
    TrelloPowerUp.initialize({
      'card-badges': function(t, options) {
        checkScheduledComments(t);

        return Promise.all([
          t.get('card', 'shared', 'allowedUsers', [ADMIN_ID]),
          t.get('card', 'shared', 'workLogs', {})
        ]).then(function(res) {
          var allowedUsers = res[0];
          var allLogs = res[1];
          var me = t.getContext().member;
          if (!allowedUsers.includes(me)) return [];

          var total = 0;
          var active = false;
          allowedUsers.forEach(u => {
            if (allLogs[u]) {
              total += (allLogs[u].logs || []).reduce((s, l) => s + (l.duration || 0), 0);
              if (allLogs[u].activeStart) {
                total += Math.floor((Date.now() - allLogs[u].activeStart) / 1000);
                active = true;
              }
            }
          });
          if (total === 0 && !active) return [];
          return [{ text: formatToHHMM(total), color: active ? 'green' : 'blue' }];
        });
      },

      'card-back-section': function(t, options) {
        return t.get('card', 'shared', 'allowedUsers', [ADMIN_ID]).then(function(allowed) {
          var me = t.getContext().member;
          if (me !== ADMIN_ID && !allowed.includes(me)) return null;

          return {
            title: '',
            icon: './icon.svg',
            content: {
              type: 'iframe',
              url: t.signUrl('./section.html'),
              initialHeight: 44
            }
          };
        });
      },

      'board-buttons': function(t, options) {
        var me = t.getContext().member;
        if (me !== ADMIN_ID) return [];

        return [{
          icon: './icon.svg',
          text: 'Reporty času',
          callback: function(t) {
            return t.modal({
              title: "Přehled odpracovaného času",
              url: './report.html',
              fullscreen: true
            });
          }
        }];
      },

      'card-buttons': function(t, options) {
        return [{
          icon: './icon.svg',
          text: 'Odeslat později',
          callback: function(t) {
            return t.popup({
              title: 'Naplánovat komentář',
              url: './scheduler.html',
              height: 280
            });
          }
        }];
      }
    }, {
      // TENTO BLOK KONFIGURACE CHYBĚL:
      appKey: '4970b28a9bf54fcfa9298b7e4e50660f',
      appName: 'Private Time Tracker'
    });
  </script>
</body>
</html>
