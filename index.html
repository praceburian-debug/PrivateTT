<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    const ADMIN_ID = '651e8ba7f2ed2f797856dfed'; 
    const TRELLO_API_KEY = '4970b28a9bf54fcfa9298b7e4e50660f'; 

    function formatToHHMM(seconds) {
      var h = Math.floor(seconds / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      return h + ":" + (m < 10 ? "0" : "") + m;
    }

    function checkScheduledComments(t) {
      // Spustíme jen u admina
      if (t.getContext().member !== ADMIN_ID) return;

      return t.get('card', 'shared', 'scheduled_comments', [])
      .then(function(comments) {
        if (!comments || comments.length === 0) return;

        var now = new Date().getTime();
        var toSend = comments.filter(c => new Date(c.date).getTime() <= now);
        var remaining = comments.filter(c => new Date(c.date).getTime() > now);

        if (toSend.length > 0) {
          return t.card('id').then(function(cardData) {
            var cardId = cardData.id;
            
            var promises = toSend.map(function(c) {
              // --- TADY JE TA OPRAVA: DEKÓDOVÁNÍ TOKENU ---
              var realToken = atob(c.token); 
              var url = `https://api.trello.com/1/cards/${cardId}/actions/comments?text=${encodeURIComponent(c.msg)}&key=${TRELLO_API_KEY}&token=${realToken}`;
              // --------------------------------------------
              return fetch(url, { method: 'POST' });
            });

            return Promise.all(promises).then(function() {
              return t.set('card', 'shared', 'scheduled_comments', remaining);
            });
          });
        }
      });
    }

    TrelloPowerUp.initialize({
      'card-badges': function(t, options) {
        // Kontrola naplánovaných komentářů běží na pozadí při každém načtení badge
        checkScheduledComments(t);

        return t.get('card', 'shared', 'workLogs').then(function(data) {
          if (!data) return [];
          var total = 0;
          var active = false;
          Object.values(data).forEach(u => {
            if (u.logs) {
              u.logs.forEach(l => { total += l.duration; });
              if (u.activeLog) {
                active = true;
                total += Math.floor((new Date().getTime() - u.activeLog.start) / 1000);
              }
            }
          });
          if (total === 0 && !active) return [];
          return [{ text: formatToHHMM(total), color: active ? 'green' : 'blue' }];
        });
      },

      'card-back-section': function(t, options) {
        return t.get('card', 'shared', 'allowedUsers', [ADMIN_ID]).then(function(allowed) {
          var me = t.getContext().member;
          if (me !== ADMIN_ID && !allowed.includes(me)) return null;
          return {
            title: '',
            icon: './icon.svg',
            content: { type: 'iframe', url: t.signUrl('./section.html'), initialHeight: 44 }
          };
        });
      },

      'board-buttons': function(t, options) {
        var me = t.getContext().member;
        if (me !== ADMIN_ID) return [];
        return [{
          icon: './icon.svg',
          text: 'Reporty času',
          callback: function(t) {
            return t.modal({ title: "Přehled odpracovaného času", url: './report.html', fullscreen: true });
          }
        }];
      },

      'card-buttons': function(t, options) {
        return [{
          icon: './icon.svg',
          text: 'Odeslat později',
          callback: function(t) {
            return t.popup({
              title: 'Naplánovat komentář',
              url: './scheduler.html',
              height: 250
            });
          }
        }];
      }
    });
  </script>
</body>
</html>
