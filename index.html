<!DOCTYPE html>
<html>
<head>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <div id="content">
    <h3>Trackovaný čas</h3>
    <div id="time-display">Načítání...</div>
  </div>

  <script>
    // Seznam ID uživatelů, kteří mají právo vidět čas
    // Své ID zjistíte na https://trello.com/me.json
    const ALLOWED_USERS = [
      '5ecce704e8946f81002abb22',
      '56c309ad83adebf290d80ff4'
      '62f0c7f59183be0274f01ecc',
      '651e8ba7f2ed2f797856dfed',
    ];

    var t = TrelloPowerUp.initialize({
     // V index.html změňte sekci card-badges takto:
'card-badges': function(t, options) {
  return t.get('card', 'shared', 'trackingData')
  .then(function(data) {
    const currentMember = t.getContext().member;
    if (!ALLOWED_USERS.includes(currentMember) || !data) {
      return [];
    }

    // Výpočet pro zobrazení (i když zrovna běží)
    let totalSeconds = data.total;
    if (data.start) {
      totalSeconds += Math.floor((Date.now() - data.start) / 1000);
    }

    const hours = (totalSeconds / 3600).toFixed(2);

    return [{
      text: hours + ' hod',
      color: data.start ? 'green' : 'blue' // Zelená pokud právě běží
    }];
  });
},
      'card-back-section': function(t, options) {
        const currentMember = t.getContext().member;

        if (ALLOWED_USERS.includes(currentMember)) {
          return {
            title: 'Soukromý Time Tracking',
           content: {
              type: 'iframe',
              url: t.signUrl('./section.html'), // Zde by byl formulář pro zadání času
              height: 100
            }
          };
        }
        return null; // Pro ostatní sekce vůbec neexistuje
      }
    });
  </script>
</body>
</html>
