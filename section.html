<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 10px; font-family: sans-serif; color: var(--ds-text, #172b4d); }
    .my-timer-card { background: var(--ds-background-neutral, #f4f5f7); padding: 12px; border-radius: 8px; margin-bottom: 20px; }
    .user-timer { font-size: 26px; font-weight: bold; margin-bottom: 10px; }
    
    .user-row { margin-bottom: 12px; border-bottom: 1px solid var(--ds-border, #ddd); padding-bottom: 8px; }
    .user-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .user-info { display: flex; align-items: center; }
    .avatar { width: 24px; height: 24px; border-radius: 50%; margin-right: 8px; background: #0079bf; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; overflow: hidden; }
    
    .logs-container { display: none; margin-top: 10px; font-size: 12px; background: var(--ds-background-neutral-subtle, #ebecf0); padding: 5px; border-radius: 4px; }
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px dotted #ccc; }
    
    /* Admin Panel Styly */
    .admin-panel { margin-top: 30px; padding: 10px; border: 1px dashed #f2d600; background: var(--ds-background-warning-viewed, #fff9ce); border-radius: 5px; color: #333; }
    .admin-panel h4 { margin: 0 0 10px 0; font-size: 13px; color: #856404; }
    .member-select-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-bottom: 6px; padding: 4px; background: rgba(255,255,255,0.5); border-radius: 3px; }
    .btn-access { padding: 2px 8px; font-size: 10px; cursor: pointer; border-radius: 3px; border: 1px solid #ccc; }
    .btn-active { background: #61bd4f; color: white; border: none; }
  </style>
</head>
<body>

  <div class="my-timer-card">
    <div id="my-display" class="user-timer">00:00:00</div>
    <button id="start-btn" class="mod-primary">Start</button>
    <button id="stop-btn" style="display:none; background:#eb5a46; color:white; border:none;">Stop</button>
  </div>

  <div id="users-list"></div>

  <div id="admin-section" style="display:none;" class="admin-panel">
    <h4>Kdo smí trackovat čas?</h4>
    <div id="members-to-authorize"></div>
  </div>

  <script>
    const ADMIN_ID = '651e8ba7f2ed2f797856dfed'; // <--- SEM DEJ SVÉ ID
    var t = TrelloPowerUp.iframe();
    var me = t.getContext().member;
    var timerInterval;

    function fTime(s) { return new Date(s * 1000).toISOString().substr(11, 8); }

    function updateUI() {
      return Promise.all([
        t.get('card', 'shared', 'workLogs', {}),
        t.card('members'),
        t.get('card', 'shared', 'allowedUsers', [ADMIN_ID])
      ]).then(function(res) {
        var allLogs = res[0];
        var cardMembers = res[1].members;
        var allowedUsers = res[2];
        
        // 1. Můj timer
        var myData = allLogs[me] || { activeStart: null, logs: [] };
        if (myData.activeStart) {
          document.getElementById('start-btn').style.display = 'none';
          document.getElementById('stop-btn').style.display = 'block';
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = setInterval(() => {
            var now = Math.floor((Date.now() - myData.activeStart) / 1000);
            document.getElementById('my-display').textContent = fTime(myData.total + now || now);
          }, 1000);
        } else {
          document.getElementById('start-btn').style.display = 'block';
          document.getElementById('stop-btn').style.display = 'none';
          document.getElementById('my-display').textContent = fTime(myData.logs ? myData.logs.reduce((s,l)=>s+l.duration,0) : 0);
          if (timerInterval) clearInterval(timerInterval);
        }

        // 2. Seznam povolených uživatelů a jejich logů
        var html = '';
        allowedUsers.forEach(userId => {
          var uData = allLogs[userId] || { logs: [] };
          var member = cardMembers.find(m => m.id === userId);
          var name = member ? member.fullName : "Uživatel " + userId.substring(0,4);
          
          var totalSec = uData.logs.reduce((sum, l) => sum + l.duration, 0);
          if (uData.activeStart) totalSec += Math.floor((Date.now() - uData.activeStart) / 1000);

          html += `
            <div class="user-row">
              <div class="user-header" onclick="toggleLogs('${userId}')">
                <div class="user-info">
                  <div class="avatar">${member && member.avatarUrl ? `<img src="${member.avatarUrl}/30.png" style="width:100%">` : (member ? member.initials : '?')}</div>
                  <span><strong>${name}</strong></span>
                </div>
                <span>${(totalSec / 3600).toFixed(2)} h ▾</span>
              </div>
              <div class="logs-container" id="logs-${userId}">
                ${uData.logs.map((log, idx) => `
                  <div class="log-item">
                    <span>${new Date(log.date).toLocaleDateString()}: ${(log.duration / 3600).toFixed(2)} h</span>
                    <button onclick="deleteLog('${userId}', ${idx})" style="width:auto; padding:2px 5px;">✕</button>
                  </div>
                `).join('') || '<div style="padding:5px;opacity:0.5">Žádná historie</div>'}
              </div>
            </div>`;
        });
        document.getElementById('users-list').innerHTML = html;

        // 3. ADMIN PANEL: Seznam všech členů karty k povolení
        if (me === ADMIN_ID) {
          document.getElementById('admin-section').style.display = 'block';
          var adminHtml = '';
          cardMembers.forEach(m => {
            var isAllowed = allowedUsers.includes(m.id);
            adminHtml += `
              <div class="member-select-row">
                <span>${m.fullName}</span>
                <button class="btn-access ${isAllowed ? 'btn-active' : ''}" onclick="toggleAccess('${m.id}')">
                  ${isAllowed ? 'Povolen ✓' : 'Nepovolen'}
                </button>
              </div>`;
          });
          document.getElementById('members-to-authorize').innerHTML = adminHtml;
        }
      });
    }

    window.toggleAccess = function(userId) {
      if (userId === ADMIN_ID) return; // Sebe si nezakážeš
      t.get('card', 'shared', 'allowedUsers', [ADMIN_ID]).then(allowed => {
        if (allowed.includes(userId)) {
          allowed = allowed.filter(id => id !== userId);
        } else {
          allowed.push(userId);
        }
        return t.set('card', 'shared', 'allowedUsers', allowed);
      }).then(updateUI);
    };

    // ... (zbytek funkcí Start/Stop/DeleteLog zůstává stejný jako minule) ...
    document.getElementById('start-btn').addEventListener('click', function() {
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        if (!data[me]) data[me] = { activeStart: null, logs: [] };
        data[me].activeStart = Date.now();
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    });

    document.getElementById('stop-btn').addEventListener('click', function() {
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        var duration = Math.floor((Date.now() - data[me].activeStart) / 1000);
        data[me].logs.push({ date: Date.now(), duration: duration });
        data[me].activeStart = null;
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    });

    window.toggleLogs = id => {
      var el = document.getElementById('logs-' + id);
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    };

    window.deleteLog = (uid, idx) => {
      t.get('card', 'shared', 'workLogs').then(data => {
        data[uid].logs.splice(idx, 1);
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    };

    updateUI();
  </script>
</body>
</html>
