<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 10px; font-family: -apple-system, sans-serif; color: var(--ds-text, #172b4d); }
    .status-bar { font-size: 9px; opacity: 0.5; margin-bottom: 10px; }
    .my-timer-card { background: var(--ds-background-neutral, #f4f5f7); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--ds-border, #ccc); text-align: center; }
    .user-timer { font-size: 32px; font-weight: bold; margin-bottom: 10px; font-family: monospace; }
    
    .user-row { margin-bottom: 8px; border-bottom: 1px solid var(--ds-border, #eee); padding-bottom: 5px; }
    .user-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 4px; border-radius: 4px; }
    .user-header:hover { background: var(--ds-background-neutral-hovered, #ebecf0); }
    
    .logs-container { display: none; margin-top: 5px; font-size: 12px; padding: 0 8px 8px 15px; }
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dotted #eee; color: #5e6c84; }
    
    /* Vylepšená inline editace */
    .edit-input { width: 80px; padding: 2px 4px; border: 1px solid #4c9aff; border-radius: 3px; font-size: 11px; font-family: monospace; outline: none; }
    .log-controls button { padding: 0 6px; font-size: 10px; cursor: pointer; margin-left: 3px; background: transparent; border: 1px solid #ddd; border-radius: 3px; color: #888; }
    
    .admin-panel { margin-top: 25px; border-top: 2px solid #eee; padding-top: 10px; }
    .admin-title { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 15px; letter-spacing: 1px; }
    .admin-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; border-bottom: 1px solid #f9f9f9; }
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #00a854; }
    input:checked + .slider:before { transform: translateX(14px); }

    button.mod-primary { width: 100%; padding: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="status" class="status-bar">Načítání...</div>
  <div class="my-timer-card">
    <div id="my-display" class="user-timer">00:00:00</div>
    <button id="start-btn" class="mod-primary">SPUSTIT MĚŘENÍ</button>
    <button id="stop-btn" style="display:none; width:100%; background:#eb5a46; color:white; border:none; padding:10px; font-weight:bold; border-radius:3px; cursor:pointer;">ZASTAVIT A ULOŽIT</button>
  </div>
  <div id="users-list"></div>
  <div id="admin-section" style="display:none;" class="admin-panel">
    <div class="admin-title">ADMINISTRACE PŘÍSTUPŮ</div>
    <div id="members-to-authorize"></div>
  </div>

  <script>
    const ADMIN_ID = '651e8ba7f2ed2f797856dfed'; 
    var t = TrelloPowerUp.iframe();
    var openLogsId = null;
    var editingIdx = null;

    // Pomocné funkce pro formátování
    function fTimeFull(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
    
    function formatToHM(seconds) {
      var h = Math.floor(seconds / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      let res = "";
      if (h > 0) res += h + "h ";
      res += m + "m";
      return res;
    }

    function parseToSeconds(str) {
      let seconds = 0;
      const hMatch = str.match(/(\d+)\s*h/);
      const mMatch = str.match(/(\d+)\s*m/);
      if (hMatch) seconds += parseInt(hMatch[1]) * 3600;
      if (mMatch) seconds += parseInt(mMatch[1]) * 60;
      // Pokud uživatel zadal jen číslo bez jednotek, bereme to jako minuty
      if (!hMatch && !mMatch && !isNaN(str)) seconds += parseInt(str) * 60;
      return seconds;
    }

    function updateUI(forceFullRedraw = false) {
      var me = t.getContext().member;
      return Promise.all([
        t.get('card', 'shared', 'workLogs', {}),
        t.card('members'),
        t.get('card', 'shared', 'allowedUsers', [ADMIN_ID])
      ]).then(function(res) {
        var allLogs = res[0] || {};
        var cardMembers = res[1].members || [];
        var allowedUsers = res[2] || [ADMIN_ID];

        var myData = allLogs[me] || { activeStart: null, logs: [] };
        var myStoredTotal = (myData.logs || []).reduce((s,l) => s + (l.duration || 0), 0);
        
        if (myData.activeStart) {
          document.getElementById('start-btn').style.display = 'none';
          document.getElementById('stop-btn').style.display = 'block';
          var sess = Math.floor((Date.now() - myData.activeStart) / 1000);
          document.getElementById('my-display').textContent = fTimeFull(myStoredTotal + sess);
        } else {
          document.getElementById('start-btn').style.display = 'block';
          document.getElementById('stop-btn').style.display = 'none';
          document.getElementById('my-display').textContent = fTimeFull(myStoredTotal);
        }

        if (editingIdx === null && (forceFullRedraw || document.getElementById('users-list').innerHTML === "")) {
          var html = '';
          allowedUsers.forEach(userId => {
            var member = cardMembers.find(m => m.id === userId);
            if (!member) return;
            var uData = allLogs[userId] || { logs: [] };
            var totalSec = (uData.logs || []).reduce((sum, l) => sum + (l.duration || 0), 0);
            if (uData.activeStart) totalSec += Math.floor((Date.now() - uData.activeStart) / 1000);

            html += `
              <div class="user-row">
                <div class="user-header" onclick="toggleLogs('${userId}')">
                  <span><strong>${member.fullName}</strong> ${uData.activeStart ? '🟢' : ''}</span>
                  <span><strong>${formatToHM(totalSec)}</strong> ▾</span>
                </div>
                <div class="logs-container" id="logs-${userId}" style="display: ${openLogsId === userId ? 'block' : 'none'}">
                  ${(uData.logs || []).map((log, idx) => {
                    var dateStr = new Date(log.date).toLocaleDateString();
                    var hmStr = formatToHM(log.duration);
                    return `
                    <div class="log-item">
                      <span>${dateStr}: <b id="val-${userId}-${idx}">${hmStr}</b></span>
                      ${userId === me ? `
                        <div class="log-controls">
                          <button onclick="startEdit('${userId}', ${idx}, '${hmStr}')">✎</button>
                          <button onclick="deleteLog(${idx})">✕</button>
                        </div>` : ''}
                    </div>`;
                  }).join('') || '<div style="opacity:0.5; padding: 5px 0;">Bez historie</div>'}
                </div>
              </div>`;
          });
          document.getElementById('users-list').innerHTML = html;
        }

        if (me === ADMIN_ID && (forceFullRedraw || document.getElementById('members-to-authorize').innerHTML === "")) {
          document.getElementById('admin-section').style.display = 'block';
          var adminHtml = '';
          cardMembers.forEach(m => {
            var isAllowed = allowedUsers.includes(m.id);
            adminHtml += `<div class="admin-row"><span>${m.fullName}</span><label class="switch"><input type="checkbox" ${isAllowed ? 'checked' : ''} onchange="toggleAccess('${m.id}')"><span class="slider"></span></label></div>`;
          });
          document.getElementById('members-to-authorize').innerHTML = adminHtml;
        }
      });
    }

    window.startEdit = function(userId, idx, currentHM) {
      editingIdx = idx;
      var container = document.getElementById(`val-${userId}-${idx}`);
      container.innerHTML = `<input type="text" class="edit-input" id="input-${idx}" value="${currentHM}" onblur="cancelEdit()" onkeydown="handleEditKey(event, ${idx})">`;
      document.getElementById(`input-${idx}`).focus();
    };

    window.handleEditKey = function(e, idx) {
      if (e.key === 'Enter') saveEdit(idx, e.target.value);
      else if (e.key === 'Escape') cancelEdit();
    };

    window.saveEdit = function(idx, val) {
      var seconds = parseToSeconds(val);
      if (seconds === 0 && val !== "0m") return cancelEdit();
      var me = t.getContext().member;
      t.get('card', 'shared', 'workLogs').then(d => {
        d[me].logs[idx].duration = seconds;
        return t.set('card', 'shared', 'workLogs', d);
      }).then(() => { editingIdx = null; updateUI(true); });
    };

    window.cancelEdit = function() {
      setTimeout(() => { editingIdx = null; updateUI(true); }, 150);
    };

    setInterval(() => updateUI(false), 1000);

    window.toggleLogs = function(id) {
      if (editingIdx !== null) return;
      var el = document.getElementById('logs-' + id);
      if (openLogsId === id) { el.style.display = 'none'; openLogsId = null; }
      else {
        if (openLogsId) { var prev = document.getElementById('logs-' + openLogsId); if (prev) prev.style.display = 'none'; }
        el.style.display = 'block'; openLogsId = id;
      }
    };

    document.getElementById('start-btn').onclick = function() {
      var me = t.getContext().member;
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        if (!data[me]) data[me] = { activeStart: null, logs: [] };
        data[me].activeStart = Date.now();
        return t.set('card', 'shared', 'workLogs', data);
      }).then(() => updateUI(true));
    };

    document.getElementById('stop-btn').onclick = function() {
      var me = t.getContext().member;
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        var duration = Math.floor((Date.now() - data[me].activeStart) / 1000);
        if (!data[me].logs) data[me].logs = [];
        data[me].logs.push({ date: Date.now(), duration: duration });
        data[me].activeStart = null;
        return t.set('card', 'shared', 'workLogs', data);
      }).then(() => updateUI(true));
    };

    window.deleteLog = function(idx) {
      var me = t.getContext().member;
      if (confirm("Smazat?")) {
        t.get('card', 'shared', 'workLogs').then(d => {
          d[me].logs.splice(idx, 1);
          return t.set('card', 'shared', 'workLogs', d);
        }).then(() => updateUI(true));
      }
    };

    window.toggleAccess = function(uid) {
      t.get('card', 'shared', 'allowedUsers', [ADMIN_ID]).then(a => {
        a = a.includes(uid) ? (uid===ADMIN_ID ? a : a.filter(i=>i!==uid)) : [...a, uid];
        return t.set('card', 'shared', 'allowedUsers', a);
      }).then(() => updateUI(true));
    };

    updateUI(true);
  </script>
</body>
</html>
