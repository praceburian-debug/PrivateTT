<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 10px; font-family: sans-serif; }
    .timer-display { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #172b4d; }
    button { width: 100%; margin-bottom: 5px; cursor: pointer; }
    .btn-stop { background-color: #eb5a46; color: white; }
    .btn-stop:hover { background-color: #cf513d; }
  </style>
</head>
<body>
  <div class="timer-display" id="display">00:00:00</div>
  
  <button id="start-btn" class="mod-primary">Start</button>
  <button id="stop-btn" class="btn-stop" style="display:none;">Stop</button>
  <button id="reset-btn" class="mod-quiet">Resetovat vše</button>

  <script>
    var t = TrelloPowerUp.iframe();
    var timerInterval;

    // Pomocná funkce pro formátování sekund na HH:MM:SS
    function formatTime(seconds) {
      return new Date(seconds * 1000).toISOString().substr(11, 8);
    }

    function updateUI() {
      return t.get('card', 'shared', 'trackingData', { total: 0, start: null })
        .then(function(data) {
          if (data.start) {
            // Časovač běží
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'block';
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function() {
              var elapsedSinceStart = Math.floor((Date.now() - data.start) / 1000);
              document.getElementById('display').textContent = formatTime(data.total + elapsedSinceStart);
            }, 1000);
          } else {
            // Časovač stojí
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('display').textContent = formatTime(data.total);
            if (timerInterval) clearInterval(timerInterval);
          }
        });
    }

    // Tlačítko START
    document.getElementById('start-btn').addEventListener('click', function() {
      return t.get('card', 'shared', 'trackingData', { total: 0, start: null })
        .then(function(data) {
          data.start = Date.now();
          return t.set('card', 'shared', 'trackingData', data);
        })
        .then(updateUI);
    });

    // Tlačítko STOP
    document.getElementById('stop-btn').addEventListener('click', function() {
      return t.get('card', 'shared', 'trackingData', { total: 0, start: null })
        .then(function(data) {
          if (data.start) {
            var sessionSeconds = Math.floor((Date.now() - data.start) / 1000);
            data.total += sessionSeconds;
            data.start = null;
          }
          return t.set('card', 'shared', 'trackingData', data);
        })
        .then(updateUI);
    });

    // Tlačítko RESET
    document.getElementById('reset-btn').addEventListener('click', function() {
      if(confirm('Opravdu chcete vymazat veškerý čas na této kartě?')) {
        return t.set('card', 'shared', 'trackingData', { total: 0, start: null }).then(updateUI);
      }
    });

    // Inicializace při otevření
    updateUI();
  </script>
</body>
</html>
