<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 10px; font-family: sans-serif; color: var(--ds-text, #172b4d); }
    .my-timer-card { background: var(--ds-background-neutral, #f4f5f7); padding: 12px; border-radius: 8px; margin-bottom: 20px; }
    .user-timer { font-size: 26px; font-weight: bold; margin-bottom: 10px; }
    
    .user-row { margin-bottom: 15px; border-bottom: 1px solid var(--ds-border, #ddd); padding-bottom: 10px; }
    .user-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .user-info { display: flex; align-items: center; }
    .avatar { width: 24px; height: 24px; border-radius: 50%; margin-right: 8px; background: #0079bf; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; }
    
    .logs-container { display: none; margin-top: 10px; font-size: 12px; background: var(--ds-background-neutral-subtle, #ebecf0); padding: 5px; border-radius: 4px; }
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px dotted #ccc; }
    .log-controls button { padding: 2px 5px; font-size: 10px; margin-left: 3px; width: auto; display: inline-block; }
    
    .edit-input { width: 50px; font-size: 11px; }
    button.mod-danger { background: var(--ds-background-danger, #eb5a46); color: white; border: none; }
  </style>
</head>
<body>

  <div class="my-timer-card">
    <div id="my-display" class="user-timer">00:00:00</div>
    <button id="start-btn" class="mod-primary">Start</button>
    <button id="stop-btn" class="mod-danger" style="display:none;">Stop</button>
  </div>

  <div id="users-list"></div>

  <script>
    var t = TrelloPowerUp.iframe();
    var me = t.getContext().member;
    var timerInterval;

    // Pomocná funkce pro formátování sekund na HH:MM:SS
    function fTime(s) { return new Date(s * 1000).toISOString().substr(11, 8); }

    function updateUI() {
      return Promise.all([
        t.get('card', 'shared', 'workLogs', {}), // Nový klíč pro novou strukturu
        t.card('members')
      ]).then(function(res) {
        var allLogs = res[0];
        var members = res[1].members;
        var myData = allLogs[me] || { activeStart: null, logs: [] };

        // 1. Logika mého běžícího timeru
        if (myData.activeStart) {
          document.getElementById('start-btn').style.display = 'none';
          document.getElementById('stop-btn').style.display = 'block';
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = setInterval(() => {
            var now = Math.floor((Date.now() - myData.activeStart) / 1000);
            document.getElementById('my-display').textContent = fTime(now);
          }, 1000);
        } else {
          document.getElementById('start-btn').style.display = 'block';
          document.getElementById('stop-btn').style.display = 'none';
          document.getElementById('my-display').textContent = "00:00:00";
          if (timerInterval) clearInterval(timerInterval);
        }

        // 2. Vykreslení seznamu uživatelů a jejich logů
        var html = '';
        Object.keys(allLogs).forEach(userId => {
          var uData = allLogs[userId];
          var member = members.find(m => m.id === userId);
          var name = member ? member.fullName : "Uživatel";
          
          var totalSec = uData.logs.reduce((sum, l) => sum + l.duration, 0);
          if (uData.activeStart) totalSec += Math.floor((Date.now() - uData.activeStart) / 1000);

          html += `
            <div class="user-row">
              <div class="user-header" onclick="toggleLogs('${userId}')">
                <div class="user-info">
                  <div class="avatar">${member ? member.initials : '?'}</div>
                  <span><strong>${name}</strong></span>
                </div>
                <span>${(totalSec / 3600).toFixed(2)} h ▾</span>
              </div>
              <div class="logs-container" id="logs-${userId}">
                ${uData.logs.map((log, idx) => `
                  <div class="log-item">
                    <span>${new Date(log.date).toLocaleDateString()}: ${(log.duration / 3600).toFixed(2)} h</span>
                    <div class="log-controls">
                      <button onclick="editLog('${userId}', ${idx})">✎</button>
                      <button class="mod-danger" onclick="deleteLog('${userId}', ${idx})">✕</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>`;
        });
        document.getElementById('users-list').innerHTML = html;
      });
    }

    // --- AKCE ---
    
    document.getElementById('start-btn').addEventListener('click', function() {
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        if (!data[me]) data[me] = { activeStart: null, logs: [] };
        data[me].activeStart = Date.now();
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    });

    document.getElementById('stop-btn').addEventListener('click', function() {
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        var start = data[me].activeStart;
        var duration = Math.floor((Date.now() - start) / 1000);
        data[me].logs.push({ date: Date.now(), duration: duration });
        data[me].activeStart = null;
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    });

    window.toggleLogs = function(id) {
      var el = document.getElementById('logs-' + id);
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    };

    window.deleteLog = function(uid, idx) {
      t.get('card', 'shared', 'workLogs').then(data => {
        data[uid].logs.splice(idx, 1);
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    };

    window.editLog = function(uid, idx) {
      var newHours = prompt("Zadej nový čas v hodinách (např. 1.5):");
      if (newHours !== null) {
        t.get('card', 'shared', 'workLogs').then(data => {
          data[uid].logs[idx].duration = parseFloat(newHours) * 3600;
          return t.set('card', 'shared', 'workLogs', data);
        }).then(updateUI);
      }
    };

    updateUI();
  </script>
</body>
</html>
