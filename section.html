<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 12px; font-family: -apple-system, sans-serif; color: var(--ds-text, #172b4d); }
    .status-msg { text-align: center; margin-top: 20px; color: var(--ds-text-subtle, #5e6c84); }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 12px; }
    input, textarea { 
      width: 100%; margin-bottom: 12px; border: 1px solid var(--ds-border, #dfe1e6); 
      border-radius: 3px; padding: 8px; box-sizing: border-box; 
    }
    textarea { height: 60px; resize: none; }
    .btn-primary { 
      width: 100%; background: #5794F2; color: white; border: none; 
      padding: 10px; border-radius: 3px; font-weight: 600; cursor: pointer; 
    }
    #auth-section, #scheduler-form { display: none; }
  </style>
</head>
<body>

  <div id="loading" class="status-msg">Načítám...</div>

  <div id="auth-section">
    <p style="text-align:center">Pro plánování komentářů musíte aplikaci povolit přístup.</p>
    <button id="auth-btn" class="btn-primary">Autorizovat</button>
  </div>

  <div id="scheduler-form">
    <label>Kdy odeslat?</label>
    <input type="datetime-local" id="date">

    <label>Zpráva</label>
    <textarea id="msg" placeholder="Napište text komentáře..."></textarea>

    <button id="save-btn" class="btn-primary">Naplánovat odeslání</button>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();

    // Kontrola autorizace
    t.getRestApi().isAuthorized()
      .then(function(authorized) {
        document.getElementById('loading').style.display = 'none';
        if (authorized) {
          document.getElementById('scheduler-form').style.display = 'block';
          // Nastavíme dnešní datum jako default
          var now = new Date();
          now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
          document.getElementById('date').value = now.toISOString().slice(0,16);
        } else {
          document.getElementById('auth-section').style.display = 'block';
        }
      })
      .catch(function() {
        document.getElementById('loading').innerText = "Chyba při komunikaci s Trellem.";
      });

    document.getElementById('auth-btn').addEventListener('click', function() {
      t.getRestApi().authorize({ scope: 'read,write' })
        .then(function() {
          location.reload(); // Po autorizaci stránku obnovíme
        });
    });

    document.getElementById('save-btn').addEventListener('click', function() {
      var date = document.getElementById('date').value;
      var msg = document.getElementById('msg').value;

      if (!date || !msg) return t.alert({ message: 'Vyplňte vše!' });

      t.get('card', 'shared', 'scheduled_comments', [])
        .then(function(comments) {
          comments.push({ date: date, msg: msg });
          return t.set('card', 'shared', 'scheduled_comments', comments);
        })
        .then(function() {
          t.closePopup();
        });
    });
  </script>
</body>
</html>
