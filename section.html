<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 10px; font-family: -apple-system, sans-serif; color: var(--ds-text, #172b4d); }
    .my-timer-card { background: var(--ds-background-neutral, #f4f5f7); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--ds-border, #ccc); text-align: center; }
    .user-timer { font-size: 32px; font-weight: bold; margin-bottom: 10px; font-family: monospace; }
    
    .user-row { margin-bottom: 12px; border-bottom: 1px solid var(--ds-border, #ddd); padding-bottom: 8px; }
    .user-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 5px; border-radius: 4px; }
    .user-header:hover { background: var(--ds-background-neutral-hovered, #ebecf0); }
    .user-info { display: flex; align-items: center; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; margin-right: 10px; background: #0079bf; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
    
    .logs-container { display: none; margin-top: 8px; font-size: 12px; background: var(--ds-background-neutral-subtle, #f4f5f7); padding: 10px; border-radius: 5px; }
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dotted #ccc; }
    
    .log-controls { display: flex; gap: 5px; }
    .log-controls button { padding: 2px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; border: 1px solid #ccc; background: white; }
    .btn-del { color: #eb5a46; border-color: #eb5a46 !important; }

    .admin-panel { margin-top: 30px; padding: 12px; border: 1px dashed #f2d600; background: #fff9ce; border-radius: 8px; color: #333; }
    .admin-panel h4 { margin: 0 0 10px 0; font-size: 13px; color: #856404; text-transform: uppercase; }
    .member-select-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; margin-bottom: 8px; padding: 6px; background: rgba(255,255,255,0.7); border-radius: 4px; }
    .btn-access { padding: 4px 12px; font-size: 11px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white; font-weight: bold; }
    .btn-active { background: #61bd4f; color: white; border: none; }
    
    button.mod-primary { width: 100%; padding: 10px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="my-timer-card">
    <div id="my-display" class="user-timer">00:00:00</div>
    <button id="start-btn" class="mod-primary">SPUSTIT MĚŘENÍ</button>
    <button id="stop-btn" style="display:none; width:100%; background:#eb5a46; color:white; border:none; padding:10px; font-weight:bold; border-radius:3px; cursor:pointer;">ZASTAVIT A ULOŽIT</button>
  </div>

  <div id="users-list"></div>

  <div id="admin-section" style="display:none;" class="admin-panel">
    <h4>Správa oprávnění (Admin)</h4>
    <div id="members-to-authorize"></div>
  </div>

  <script>
    const ADMIN_ID = '651e8ba7f2ed2f797856dfed'; // Tvoje ID vloženo napevno
    var t = TrelloPowerUp.iframe();
    var timerInterval;

    function fTimeFull(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
    function formatToHHMM(seconds) {
      var h = Math.floor(seconds / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      return h + ":" + (m < 10 ? "0" : "") + m;
    }

    function updateUI() {
      var me = t.getContext().member;

      return Promise.all([
        t.get('card', 'shared', 'workLogs', {}),
        t.card('members'),
        t.get('card', 'shared', 'allowedUsers', [ADMIN_ID])
      ]).then(function(res) {
        var allLogs = res[0] || {};
        var cardMembers = res[1].members || [];
        var allowedUsers = res[2] || [ADMIN_ID];

        // 1. Můj timer
        var myData = allLogs[me] || { activeStart: null, logs: [] };
        var myStoredTotal = (myData.logs || []).reduce((s,l) => s + (l.duration || 0), 0);

        if (myData.activeStart) {
          document.getElementById('start-btn').style.display = 'none';
          document.getElementById('stop-btn').style.display = 'block';
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = setInterval(() => {
            var sessionSeconds = Math.floor((Date.now() - myData.activeStart) / 1000);
            document.getElementById('my-display').textContent = fTimeFull(myStoredTotal + sessionSeconds);
          }, 1000);
        } else {
          document.getElementById('start-btn').style.display = 'block';
          document.getElementById('stop-btn').style.display = 'none';
          document.getElementById('my-display').textContent = fTimeFull(myStoredTotal);
          if (timerInterval) clearInterval(timerInterval);
        }

        // 2. Seznam logů
        var html = '';
        allowedUsers.forEach(userId => {
          var uData = allLogs[userId] || { logs: [] };
          var member = cardMembers.find(m => m.id === userId);
          var name = member ? member.fullName : "Uživatel";
          var totalSec = (uData.logs || []).reduce((sum, l) => sum + (l.duration || 0), 0);
          if (uData.activeStart) totalSec += Math.floor((Date.now() - uData.activeStart) / 1000);

          html += `
            <div class="user-row">
              <div class="user-header" onclick="toggleLogs('${userId}')">
                <div class="user-info">
                  <div class="avatar">${member ? member.initials : '?'}</div>
                  <span><strong>${name}</strong> ${uData.activeStart ? '🟢' : ''}</span>
                </div>
                <span><strong>${formatToHHMM(totalSec)}</strong> ▾</span>
              </div>
              <div class="logs-container" id="logs-${userId}">
                ${(uData.logs || []).map((log, idx) => `
                  <div class="log-item">
                    <span>${new Date(log.date).toLocaleDateString()}: <strong>${formatToHHMM(log.duration)}</strong></span>
                    ${userId === me ? `
                      <div class="log-controls">
                        <button onclick="editLog(${idx})">✎</button>
                        <button class="btn-del" onclick="deleteLog(${idx})">✕</button>
                      </div>
                    ` : ''}
                  </div>
                `).join('') || '<div style="padding:5px;opacity:0.5">Žádná historie</div>'}
              </div>
            </div>`;
        });
        document.getElementById('users-list').innerHTML = html;

        // 3. Admin Panel
        if (me === ADMIN_ID) {
          document.getElementById('admin-section').style.display = 'block';
          var adminHtml = '';
          cardMembers.forEach(m => {
            var isAllowed = allowedUsers.includes(m.id);
            adminHtml += `
              <div class="member-select-row">
                <span>${m.fullName}</span>
                <button class="btn-access ${isAllowed ? 'btn-active' : ''}" onclick="toggleAccess('${m.id}')">
                  ${isAllowed ? 'Povolen ✓' : 'Nepovolen'}
                </button>
              </div>`;
          });
          document.getElementById('members-to-authorize').innerHTML = adminHtml;
        }
      });
    }

    document.getElementById('start-btn').onclick = function() {
      var me = t.getContext().member;
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        if (!data[me]) data[me] = { activeStart: null, logs: [] };
        data[me].activeStart = Date.now();
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    };

    document.getElementById('stop-btn').onclick = function() {
      var me = t.getContext().member;
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        var duration = Math.floor((Date.now() - data[me].activeStart) / 1000);
        if (!data[me].logs) data[me].logs = [];
        data[me].logs.push({ date: Date.now(), duration: duration });
        data[me].activeStart = null;
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    };

    window.editLog = function(idx) {
      var me = t.getContext().member;
      var newHours = prompt("Zadej nový čas (v hodinách, např. 1.5):");
      if (newHours !== null && !isNaN(parseFloat(newHours))) {
        t.get('card', 'shared', 'workLogs').then(data => {
          data[me].logs[idx].duration = Math.round(parseFloat(newHours) * 3600);
          return t.set('card', 'shared', 'workLogs', data);
        }).then(updateUI);
      }
    };

    window.deleteLog = function(idx) {
      var me = t.getContext().member;
      if (confirm("Smazat tento záznam?")) {
        t.get('card', 'shared', 'workLogs').then(data => {
          data[me].logs.splice(idx, 1);
          return t.set('card', 'shared', 'workLogs', data);
        }).then(updateUI);
      }
    };

    window.toggleAccess = function(uid) {
      t.get('card', 'shared', 'allowedUsers', [ADMIN_ID]).then(allowed => {
        if (allowed.includes(uid)) {
          if (uid !== ADMIN_ID) allowed = allowed.filter(id => id !== uid);
        } else {
          allowed.push(uid);
        }
        return t.set('card', 'shared', 'allowedUsers', allowed);
      }).then(updateUI);
    };

    window.toggleLogs = function(id) {
      var el = document.getElementById('logs-' + id);
      el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    };

    updateUI();
  </script>
</body>
</html>
