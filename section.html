<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    body { padding: 10px; font-family: sans-serif; color: var(--ds-text, #172b4d); }
    .my-timer-card { background: var(--ds-background-neutral, #f4f5f7); padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--ds-border, #ccc); }
    .user-timer { font-size: 28px; font-weight: bold; margin-bottom: 10px; font-family: monospace; }
    .user-row { margin-bottom: 12px; border-bottom: 1px solid var(--ds-border, #ddd); padding-bottom: 8px; }
    .user-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 4px; }
    .avatar { width: 26px; height: 26px; border-radius: 50%; margin-right: 10px; background: #0079bf; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
    .logs-container { display: none; margin-top: 8px; font-size: 12px; background: var(--ds-background-neutral-subtle, #f4f5f7); padding: 8px; border-radius: 5px; }
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dotted #ccc; }
    .admin-panel { margin-top: 30px; padding: 10px; border: 1px dashed #f2d600; background: #fff9ce; border-radius: 8px; color: #333; }
    .btn-access { padding: 4px 10px; font-size: 11px; cursor: pointer; border-radius: 3px; border: 1px solid #ccc; }
    .btn-active { background: #61bd4f; color: white; border: none; }
  </style>
</head>
<body>

  <div id="error-msg" style="display:none; color:red; padding:10px; border:1px solid red; margin-bottom:10px; font-size:12px;"></div>

  <div class="my-timer-card">
    <div id="my-display" class="user-timer">00:00:00</div>
    <button id="start-btn" class="mod-primary" style="width:100%">Spustit měření</button>
    <button id="stop-btn" style="display:none; width:100%; background:#eb5a46; color:white; border:none; padding:8px; font-weight:bold; cursor:pointer;">Zastavit</button>
  </div>

  <div id="users-list"></div>

  <div id="admin-section" style="display:none;" class="admin-panel">
    <h4>Admin: Správa oprávnění</h4>
    <div id="members-to-authorize"></div>
  </div>

  <script>
    // --- KONFIGURACE ---
    const ADMIN_ID = 'TVOJE_SKUTECNE_ID'; // <--- SEM VLOŽ SVÉ ID
    
    var t = TrelloPowerUp.iframe();
    var me = t.getContext().member;
    var timerInterval;

    if (ADMIN_ID === '651e8ba7f2ed2f797856dfed') {
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-msg').textContent = "CHYBA: V souboru section.html není nastaveno ADMIN_ID!";
    }

    function fTimeFull(s) { 
      return new Date(s * 1000).toISOString().substr(11, 8); 
    }

    function formatToHHMM(seconds) {
      var h = Math.floor(seconds / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      return h + ":" + (m < 10 ? "0" : "") + m;
    }

    function updateUI() {
      return Promise.all([
        t.get('card', 'shared', 'workLogs', {}),
        t.card('members'),
        t.get('card', 'shared', 'allowedUsers', [ADMIN_ID])
      ]).then(function(res) {
        var allLogs = res[0] || {};
        var cardMembers = (res[1] && res[1].members) ? res[1].members : [];
        var allowedUsers = res[2] || [ADMIN_ID];
        
        // 1. Můj timer
        var myData = allLogs[me] || { activeStart: null, logs: [] };
        var myStoredTotal = (myData.logs || []).reduce((s,l) => s + l.duration, 0);

        if (myData.activeStart) {
          document.getElementById('start-btn').style.display = 'none';
          document.getElementById('stop-btn').style.display = 'block';
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = setInterval(() => {
            var sessionSeconds = Math.floor((Date.now() - myData.activeStart) / 1000);
            document.getElementById('my-display').textContent = fTimeFull(myStoredTotal + sessionSeconds);
          }, 1000);
        } else {
          document.getElementById('start-btn').style.display = 'block';
          document.getElementById('stop-btn').style.display = 'none';
          document.getElementById('my-display').textContent = fTimeFull(myStoredTotal);
          if (timerInterval) clearInterval(timerInterval);
        }

        // 2. Seznam uživatelů
        var html = '';
        allowedUsers.forEach(userId => {
          var uData = allLogs[userId] || { logs: [] };
          var member = cardMembers.find(m => m.id === userId);
          var name = member ? member.fullName : "Uživatel (" + userId.substring(0,4) + ")";
          var totalSec = (uData.logs || []).reduce((sum, l) => sum + l.duration, 0);
          if (uData.activeStart) totalSec += Math.floor((Date.now() - uData.activeStart) / 1000);

          html += `
            <div class="user-row">
              <div class="user-header" onclick="toggleLogs('${userId}')">
                <div class="user-info">
                  <div class="avatar">${member ? member.initials : '?'}</div>
                  <span><strong>${name}</strong> ${uData.activeStart ? '🟢' : ''}</span>
                </div>
                <span>${formatToHHMM(totalSec)} ▾</span>
              </div>
              <div class="logs-container" id="logs-${userId}">
                ${(uData.logs || []).map((log, idx) => `
                  <div class="log-item">
                    <span>${new Date(log.date).toLocaleDateString()}: ${formatToHHMM(log.duration)}</span>
                    ${userId === me ? `<button onclick="editLog(${idx})">✎</button>` : ''}
                  </div>
                `).join('') || 'Žádná historie'}
              </div>
            </div>`;
        });
        document.getElementById('users-list').innerHTML = html;

        if (me === ADMIN_ID) {
          document.getElementById('admin-section').style.display = 'block';
          var adminHtml = '';
          cardMembers.forEach(m => {
            var isAllowed = allowedUsers.includes(m.id);
            adminHtml += `<div class="member-select-row"><span>${m.fullName}</span><button class="btn-access ${isAllowed ? 'btn-active' : ''}" onclick="toggleAccess('${m.id}')">${isAllowed ? 'Ano' : 'Ne'}</button></div>`;
          });
          document.getElementById('members-to-authorize').innerHTML = adminHtml;
        }
      }).catch(err => {
        console.error("Chyba updateUI:", err);
      });
    }

    document.getElementById('start-btn').onclick = function() {
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        if (!data[me]) data[me] = { activeStart: null, logs: [] };
        data[me].activeStart = Date.now();
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    };

    document.getElementById('stop-btn').onclick = function() {
      t.get('card', 'shared', 'workLogs', {}).then(data => {
        var duration = Math.floor((Date.now() - data[me].activeStart) / 1000);
        if (!data[me].logs) data[me].logs = [];
        data[me].logs.push({ date: Date.now(), duration: duration });
        data[me].activeStart = null;
        return t.set('card', 'shared', 'workLogs', data);
      }).then(updateUI);
    };

    window.toggleAccess = (uid) => {
      t.get('card', 'shared', 'allowedUsers', [ADMIN_ID]).then(allowed => {
        allowed = allowed.includes(uid) ? allowed.filter(id => id !== uid) : [...allowed, uid];
        return t.set('card', 'shared', 'allowedUsers', allowed);
      }).then(updateUI);
    };

    window.toggleLogs = (id) => {
      var el = document.getElementById('logs-' + id);
      if (el) el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    };

    updateUI();
  </script>
</body>
</html>
