<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    /* Dynamické barvy podle Trella */
    body { 
      padding: 10px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ds-text, #172b4d); /* Černá v light, bílá v dark */
    }
    
    .label { font-size: 12px; color: var(--ds-text-subtle, #5e6c84); text-transform: uppercase; margin-bottom: 4px; }
    
    .my-timer-container { margin-bottom: 20px; padding: 10px; background: var(--ds-background-neutral, #f4f5f7); border-radius: 8px; }
    .user-timer { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
    
    button { width: 100%; cursor: pointer; font-weight: bold; border-radius: 3px; border: none; padding: 8px; }
    .btn-stop { background-color: var(--ds-background-danger, #eb5a46); color: white; }
    .btn-stop:hover { background-color: var(--ds-background-danger-hovered, #cf513d); }
    
    .history-section { margin-top: 20px; border-top: 1px solid var(--ds-border, #ddd); padding-top: 15px; }
    .user-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 4px 0; }
    .user-info { display: flex; align-items: center; }
    .avatar { width: 24px; height: 24px; border-radius: 50%; margin-right: 10px; background: #ccc; }
    .user-name { font-size: 14px; font-weight: 500; }
    .user-time-val { font-family: monospace; font-weight: bold; font-size: 14px; }
    
    .active-dot { height: 8px; width: 8px; background-color: #61bd4f; border-radius: 50%; margin-left: 5px; display: inline-block; }
  </style>
</head>
<body>

  <div class="my-timer-container">
    <div class="label">Můj aktuální čas</div>
    <div class="user-timer" id="my-display">00:00:00</div>
    <button id="start-btn" class="mod-primary">Spustit měření</button>
    <button id="stop-btn" class="btn-stop" style="display:none;">Zastavit a uložit</button>
  </div>
  
  <div class="history-section">
    <div class="label">Přehled časů na kartě</div>
    <div id="users-list"></div>
    <div class="user-row" style="border-top: 1px dashed var(--ds-border, #ccc); margin-top: 10px; padding-top: 10px;">
        <span class="user-name">CELKEM</span>
        <span class="user-time-val" id="grand-total">0.00 hod</span>
    </div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();
    var timerInterval;
    var me = t.getContext().member;

    function formatTime(seconds) {
      return new Date(seconds * 1000).toISOString().substr(11, 8);
    }

    function updateUI() {
      return Promise.all([
        t.get('card', 'shared', 'multiTracking', {}),
        t.card('members')
      ]).then(function(results) {
        var allData = results[0];
        var cardMembers = results[1].members;
        var myData = allData[me] || { total: 0, start: null };
        
        // 1. Můj hlavní timer
        if (myData.start) {
          document.getElementById('start-btn').style.display = 'none';
          document.getElementById('stop-btn').style.display = 'block';
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = setInterval(function() {
            var elapsed = Math.floor((Date.now() - myData.start) / 1000);
            document.getElementById('my-display').textContent = formatTime(myData.total + elapsed);
          }, 1000);
        } else {
          document.getElementById('start-btn').style.display = 'block';
          document.getElementById('stop-btn').style.display = 'none';
          document.getElementById('my-display').textContent = formatTime(myData.total);
          if (timerInterval) clearInterval(timerInterval);
        }

        // 2. Vykreslení všech uživatelů
        var listHtml = '';
        var grandTotalSeconds = 0;

        // Projdeme všechna data v databázi karty
        Object.keys(allData).forEach(function(userId) {
          var userData = allData[userId];
          var member = cardMembers.find(m => m.id === userId);
          
          var currentTotal = userData.total;
          var isActive = false;
          if (userData.start) {
            currentTotal += Math.floor((Date.now() - userData.start) / 1000);
            isActive = true;
          }
          grandTotalSeconds += currentTotal;

         // Najdeme jméno a fotku
var name = member ? member.fullName : "Uživatel " + userId.substring(0,4);
var initials = member ? member.initials : "??";

// Oprava logiky pro avatar
var avatarUrl = null;
if (member && member.avatar && member.avatar !== "null") {
    // Pokud je avatar jen hash, doplníme Trello URL, pokud je to celá URL, necháme ji
    avatarUrl = member.avatar.indexOf('http') === 0 ? member.avatar : "https://trello-avatars.s3.amazonaws.com/" + member.avatar + "/30.png";
} else if (member && member.avatarUrl) {
    avatarUrl = member.avatarUrl + "/30.png";
}

// Pokud fotka existuje, ukážeme ji, jinak ukážeme iniciály v kroužku
var avatarHtml = avatarUrl 
    ? `<img src="${avatarUrl}" class="avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` 
    : '';

var initialsHtml = `<div class="avatar" style="display:${avatarUrl ? 'none' : 'flex'}; align-items:center; justify-content:center; background:var(--ds-background-accent-blue-subtler, #0079bf); color:white; font-size:10px;">${initials}</div>`;

listHtml += `
  <div class="user-row">
    <div class="user-info">
      <div style="position:relative; width:24px; height:24px; margin-right:10px;">
        ${avatarHtml}
        ${initialsHtml}
      </div>
      <span class="user-name">${name} ${isActive ? '<span class="active-dot"></span>' : ''}</span>
    </div>
    <span class="user-time-val">${(currentTotal / 3600).toFixed(2)} h</span>
  </div>
`;
        });

        document.getElementById('users-list').innerHTML = listHtml || '<div style="font-size:12px; opacity:0.6;">Zatím žádné záznamy</div>';
        document.getElementById('grand-total').textContent = (grandTotalSeconds / 3600).toFixed(2) + " hod";
      });
    }

    // Event listenery pro Start/Stop
    document.getElementById('start-btn').addEventListener('click', function() {
      return t.get('card', 'shared', 'multiTracking', {})
        .then(function(allData) {
          if (!allData[me]) allData[me] = { total: 0, start: null };
          allData[me].start = Date.now();
          return t.set('card', 'shared', 'multiTracking', allData);
        }).then(updateUI);
    });

    document.getElementById('stop-btn').addEventListener('click', function() {
      return t.get('card', 'shared', 'multiTracking', {})
        .then(function(allData) {
          var myData = allData[me];
          if (myData && myData.start) {
            myData.total += Math.floor((Date.now() - myData.start) / 1000);
            myData.start = null;
          }
          return t.set('card', 'shared', 'multiTracking', allData);
        }).then(updateUI);
    });

    updateUI();
  </script>
</body>
</html>
