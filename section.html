<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body style="padding: 20px;">

  <div id="status-display" style="font-weight:bold; margin-bottom:10px;">Načítání...</div>
  
  <div class="my-timer-card">
    <div id="my-display" style="font-size:30px; font-family:monospace;">00:00:00</div>
    <button id="start-btn" class="mod-primary">START</button>
  </div>

  <div id="admin-panel" style="display:none; margin-top:20px; padding:10px; background:#fff9ce; border:1px dashed #f2d600;">
    <h4>Admin panel je viditelný!</h4>
  </div>

  <script>
    console.log("Skript v section.html se spouští...");
    alert("Power-Up se pokouší spustit!"); // Pokud tohle neuvidíš, soubor se nenačetl

    var t = TrelloPowerUp.iframe();
    var MY_ID = '651e8ba7f2ed2f797856dfed';

    function updateUI() {
      var context = t.getContext();
      var me = context.member;
      
      document.getElementById('status-display').textContent = "Přihlášen jako: " + me;
      
      if (me === MY_ID) {
        document.getElementById('admin-panel').style.display = 'block';
      }

      t.get('card', 'shared', 'workLogs', {}).then(function(data){
        console.log("Data z karty načtena:", data);
      });
    }

    document.getElementById('start-btn').onclick = function() {
      alert("Klikl jsi na Start!");
      t.set('card', 'shared', 'lastClick', Date.now());
    };

    // Spuštění
    try {
      updateUI();
    } catch (e) {
      console.error("Chyba při updateUI:", e);
      document.getElementById('status-display').textContent = "CHYBA: " + e.message;
    }
  </script>
</body>
</html>
