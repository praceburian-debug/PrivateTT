<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Použití Trello proměnných pro automatický Dark Mode */
    body { 
      padding: 20px; 
      background-color: var(--ds-background-neutral, #f4f5f7); 
      color: var(--ds-text, #172b4d);
      font-family: sans-serif; 
    }
    .controls { 
      display: flex; gap: 10px; align-items: flex-end; margin-bottom: 20px; 
      background: var(--ds-background-section, white); 
      padding: 15px; border-radius: 8px; flex-wrap: wrap; 
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-weight: bold; font-size: 11px; color: var(--ds-text-subtle, #5e6c84); }
    
    select, input { 
      border: 1px solid var(--ds-border, #dfe1e6); 
      background: var(--ds-background-input, white);
      color: var(--ds-text, #172b4d);
      padding: 6px; border-radius: 3px; font-size: 13px; 
    }
    
    .chart-resizable-container {
      background: var(--ds-background-section, white);
      padding: 15px; border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      overflow: hidden; resize: both; 
      min-height: 250px; height: 350px; width: 100%;
    }

    .summary-box { 
      background: var(--ds-background-section, white); 
      padding: 15px; border-radius: 8px; 
      box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
    }
    .task-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--ds-border, #eee); }
    .task-time { font-family: monospace; font-weight: bold; color: var(--ds-text-brand, #0079bf); }
  </style>
</head>
<body>

  <div class="controls">
    <div class="control-group">
      <label>Období</label>
      <select id="range-select" onchange="toggleCustomDates()">
        <option value="today">Dnes</option>
        <option value="week">Tento týden</option>
        <option value="month" selected>Tento měsíc</option>
        <option value="custom">Vlastní...</option>
      </select>
    </div>
    <div id="custom-dates" style="display:none; gap:5px;"><input type="date" id="date-from"><input type="date" id="date-to"></div>
    <div class="control-group">
      <label>Člen</label>
      <select id="member-select"><option value="all">Všichni</option></select>
    </div>
    <div class="control-group">
      <label>Task</label>
      <select id="task-select"><option value="all">Všechny aktivní tasky</option></select>
    </div>
    <button class="mod-primary" onclick="loadAndRender()">Aktualizovat</button>
  </div>

  <div class="chart-resizable-container" id="chart-container">
    <canvas id="timeChart"></canvas>
  </div>

  <div class="summary-box" id="summary">
    <h4 style="margin-top:0">Souhrn podle tasků (celkový čas týmu)</h4>
    <div id="summary-list"></div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();
    var chart;
    
    // Detekce barev pro graf podle režimu
    function getChartTheme() {
      const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      return {
        text: isDark ? '#b6c2cf' : '#172b4d',
        grid: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
      };
    }

    const COLOR_PALETTE = ['#5794F2', '#60C6D2', '#FFAB46', '#FF5B57', '#9469D6', '#00A854'];

    // ... (Logika načítání a ResizeObserveru zůstává stejná jako v předchozím kroku) ...

    function renderUI(stats) {
      const labels = [];
      const data = [];
      const theme = getChartTheme();
      const summaryList = document.getElementById('summary-list');
      summaryList.innerHTML = '';

      Object.values(stats).forEach((item) => {
        labels.push(item.name.length > 25 ? item.name.substring(0, 25) + '...' : item.name);
        const hours = (item.total / 3600).toFixed(2);
        data.push(hours);
        summaryList.innerHTML += `<div class="task-row"><span>${item.name}</span><span class="task-time">${hours} h</span></div>`;
      });

      const ctx = document.getElementById('timeChart').getContext('2d');
      if (chart) chart.destroy();
      
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{ 
            data: data, 
            backgroundColor: COLOR_PALETTE,
            borderRadius: 4
          }]
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { 
            y: { 
              beginAtZero: true,
              grid: { color: theme.grid },
              ticks: { color: theme.text }
            },
            x: {
              grid: { display: false },
              ticks: { color: theme.text }
            }
          }
        }
      });
    }

    // Ostatní pomocné funkce (getTimeRange, loadAndRender atd.) zůstávají stejné...
    // [Vlož sem zbytek JS kódu z předchozí odpovědi]
  </script>
</body>
</html>
