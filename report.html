<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { padding: 20px; background-color: #f4f5f7; font-family: sans-serif; }
    .controls { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; flex-wrap: wrap; }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    label { font-weight: bold; font-size: 11px; color: #5e6c84; }
    select, input { border: 1px solid #dfe1e6; padding: 6px; border-radius: 3px; font-size: 13px; }
    
    /* Zmenšení grafu */
    .chart-box { background: white; padding: 15px; border-radius: 8px; height: 300px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    
    /* Styl pro textový sumář */
    .summary-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .task-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
    .task-name { font-weight: 500; }
    .task-time { font-family: monospace; font-weight: bold; color: #0079bf; }
    .chart-resizable-container {
    background: white;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    
    /* Tady je to kouzlo pro tahání za růžek */
    overflow: hidden; 
    resize: both; /* Umožní měnit šířku i výšku */
    min-height: 200px;
    min-width: 300px;
    height: 350px; /* Výchozí výška */
    width: 100%;   /* Výchozí šířka */
  }

  canvas {
    width: 100% !important;
    height: 100% !important;
  }
</style>

<div class="chart-resizable-container">
  <canvas id="timeChart"></canvas>
</div>
  </style>
</head>
<body>

  <div class="controls">
    <div class="control-group">
      <label>Období</label>
      <select id="range-select" onchange="toggleCustomDates()">
        <option value="today">Dnes</option>
        <option value="week">Tento týden</option>
        <option value="month" selected>Tento měsíc</option>
        <option value="custom">Vlastní...</option>
      </select>
    </div>
    <div id="custom-dates" style="display:none; gap:5px;">
        <input type="date" id="date-from">
        <input type="date" id="date-to">
    </div>
    <div class="control-group">
      <label>Člen</label>
      <select id="member-select"><option value="all">Všichni</option></select>
    </div>
    <div class="control-group">
      <label>Task</label>
      <select id="task-select"><option value="all">Všechny aktivní tasky</option></select>
    </div>
    <button class="mod-primary" onclick="loadAndRender()">Aktualizovat</button>
  </div>

  <div class="chart-box">
    <canvas id="timeChart"></canvas>
  </div>

  <div class="summary-box" id="summary">
    <h4>Souhrn podle tasků (celkový čas týmu)</h4>
    <div id="summary-list"></div>
  </div>

  <script>
    var t = TrelloPowerUp.iframe();
    var chart;

    // Lepší paleta barev
    const COLOR_PALETTE = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF', '#46EB36'];

    function getMemberColor(index) {
      return COLOR_PALETTE[index % COLOR_PALETTE.length];
    }

    function toggleCustomDates() {
      document.getElementById('custom-dates').style.display = document.getElementById('range-select').value === 'custom' ? 'flex' : 'none';
    }

    async function loadAndRender() {
      const range = getTimeRange();
      const selMember = document.getElementById('member-select').value;
      const selTask = document.getElementById('task-select').value;
      
      const cards = await t.cards('all');
      const boardMembers = (await t.board('members')).members || [];
      
      // Plnění selectů (jen jednou)
      if (document.getElementById('member-select').options.length === 1) {
        boardMembers.forEach(m => document.getElementById('member-select').add(new Option(m.fullName, m.id)));
      }

      let taskStats = {}; // { taskId: { name: string, total: seconds } }
      let twoMonthsAgo = Date.now() - (60 * 24 * 60 * 60 * 1000);

      for (let card of cards) {
        const logs = await t.get(card.id, 'shared', 'workLogs', {});
        let cardTotal = 0;
        let hasAnyLog = false;

        for (let userId in logs) {
          const userLogs = logs[userId].logs || [];
          userLogs.forEach(log => {
            // Kontrola pro dropdown (poslední 2 měsíce)
            if (log.date > twoMonthsAgo) hasAnyLog = true;

            // Filtrování pro graf a sumář
            if (log.date >= range.start && log.date <= range.end) {
              if (selMember === 'all' || userId === selMember) {
                cardTotal += log.duration;
              }
            }
          });
        }

        // Naplnění dropdownu tasků
        if (hasAnyLog && document.getElementById('task-select').options.length <= 1) {
           document.getElementById('task-select').add(new Option(card.name, card.id));
        }

        if (cardTotal > 0) {
          if (selTask === 'all' || card.id === selTask) {
            taskStats[card.id] = { name: card.name, total: cardTotal };
          }
        }
      }

      renderUI(taskStats);
    }

    function renderUI(stats) {
      const labels = [];
      const data = [];
      const summaryList = document.getElementById('summary-list');
      summaryList.innerHTML = '';

      Object.values(stats).forEach((item, index) => {
        labels.push(item.name.length > 20 ? item.name.substring(0, 20) + '...' : item.name);
        const hours = (item.total / 3600).toFixed(2);
        data.push(hours);

        // Přidání do textového sumáře
        summaryList.innerHTML += `
          <div class="task-row">
            <span class="task-name">${item.name}</span>
            <span class="task-time">${hours} h</span>
          </div>`;
      });

      const ctx = document.getElementById('timeChart').getContext('2d');
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{ 
            label: 'Hodin celkem na tasku', 
            data: data, 
            backgroundColor: COLOR_PALETTE[1], // Jednotná barva pro tasky, nebo COLOR_PALETTE pro pestrost
            borderRadius: 4
          }]
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    function getTimeRange() {
      const range = document.getElementById('range-select').value;
      let s = new Date(); let e = new Date(); s.setHours(0,0,0,0); e.setHours(23,59,59,999);
      if (range === 'week') { s.setDate(s.getDate() - s.getDay() + 1); }
      else if (range === 'month') { s.setDate(1); }
      else if (range === 'custom') { 
        s = new Date(document.getElementById('date-from').value); 
        e = new Date(document.getElementById('date-to').value); 
        e.setHours(23,59,59,999);
      }
      return { start: s.getTime(), end: e.getTime() };
    }

    t.render(function() { if(!chart) loadAndRender(); });
  </script>
</body>
</html>
